name: Build and Release Rust Binaries

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: are-we-there-yet
  MISE_EXPERIMENTAL: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    # Dynamically select the runner OS based on the matrix target
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
            legacy_target: x86_64-pc-windows-gnu
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ""

    steps:
      - uses: actions/checkout@v6

      # ------------------------
      # Toolchain: mise & Rust
      # ------------------------
      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true # Triggers installation from .mise.toml / .tool-versions

      - name: Install Rust Target
        shell: bash
        run: rustup target add ${{ matrix.target }}

      # ------------------------
      # Rust Cache
      # ------------------------
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-fast
          cache-all-crates: true

      - name: Install Linux build tools & linkers
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --assume-yes mold
          
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install --assume-yes gcc-aarch64-linux-gnu
          fi

      # ------------------------
      # Build (Native Cargo)
      # ------------------------
      - name: Build
        shell: bash
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --target ${{ matrix.target }}

      # ------------------------
      # Package Binary
      # ------------------------
      - name: Prepare Artifact
        id: prep
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          EXT="${{ matrix.ext }}"
          OUT="${BIN_NAME}-${TARGET}${EXT}"
          
          cp target/${TARGET}/release/${BIN_NAME}${EXT} $OUT
          
          {
            echo "artifacts_pattern<<EOF"
            echo "$OUT"
          } >> $GITHUB_OUTPUT
          
          # legacy fallback if defined
          if [ -n "${{ matrix.legacy_target }}" ]; then
            LEGACY_OUT="${BIN_NAME}-${{ matrix.legacy_target }}${EXT}"
            cp $OUT $LEGACY_OUT
            echo "$LEGACY_OUT" >> $GITHUB_OUTPUT
          fi
          
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.target }}
          path: ${{ steps.prep.outputs.artifacts_pattern }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true 

      # ------------------------
      # Version + Tag Validation
      # ------------------------
      - name: Extract Version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -n1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Enforce Version Change
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v$VERSION"

          git fetch --tags

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists. Please bump your Cargo.toml version."
            exit 1
          fi

      # ------------------------
      # Changelog
      # ------------------------
      - name: Generate Changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PREV=$(git tag --sort=-v:refname | head -n1 || true)

          if [ -z "$PREV" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)")
          else
            LOG=$(git log "$PREV"..HEAD --pretty=format:"- %s (%h)")
          fi

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "## Changes" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ------------------------
      # Release Publish
      # ------------------------
      - name: Create Tag + Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: are-we-there-yet v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}